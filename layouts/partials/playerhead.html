{{- /* Minecraft playerhead avatar next to a username. Context = the IGN.
     Mirrors the old wiki's Template:Player (minotar.net helm render). */ -}}
{{- with trim . " " -}}
<span class="inline-flex items-center gap-1 whitespace-nowrap align-middle">
  <img src="https://minotar.net/helm/{{ . }}/20.png" width="20" height="20" loading="lazy"
       alt="" class="playerhead-img pixelated shrink-0">
  <span>{{ . }}</span>
</span>
{{- end -}}
