{{- /* ctx: dict "coord" <"x y z" string> "season" <optional season key from data/maps.yaml, e.g. "season-4"> */ -}}
{{- $coord := .coord -}}
{{- $season := .season -}}
<span class="inline-flex items-center gap-1.5">
  <span class="coord" data-coord="{{ $coord }}">{{ $coord }}</span>
  {{- if $season -}}
    {{- $xz := partial "coord-xz.html" $coord -}}
    {{- with $xz.x -}}
    <a class="coord-map-link" href="{{ printf "/survival/%s/map/?x=%v&z=%v" $season $xz.x $xz.z | relURL }}" title="View on map">🗺</a>
    {{- end -}}
  {{- end -}}
</span>
