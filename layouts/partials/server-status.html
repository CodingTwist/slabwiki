{{/* Live server status panel. Polls mcsrvstat once, client-side; degrades to
     a quiet "checking…" state if the API is unreachable. Address comes from
     params.serverAddress in hugo.toml. */}}
{{ with .Site.Params.serverAddress }}
<div class="mc-panel-grass border-[3px] p-3 shadow-[4px_4px_0_var(--c-shadow)]">
  <div class="pixel-label text-[9px] text-white mb-2">Server status</div>
  <div class="flex items-center gap-2 text-white font-extrabold text-[15px]">
    <span id="srv-dot" class="inline-block w-3 h-3 border-2 border-line bg-[#e0c65a]"></span>
    <span id="srv-state">Checking…</span>
  </div>
  <div class="mt-2.5 h-3 bg-[rgba(0,0,0,.28)] border-2 border-line">
    <div id="srv-bar" class="h-full w-0 bg-[repeating-linear-gradient(90deg,#a6e05a_0_6px,#7cc24a_6px_12px)]"></div>
  </div>
  <div id="srv-players" class="text-on-grass-dim text-xs mt-1.5">{{ . }}</div>
</div>
<script>
(function(){
  fetch('https://api.mcsrvstat.us/3/{{ . }}')
    .then(function(r){ return r.json(); })
    .then(function(s){
      var dot = document.getElementById('srv-dot');
      var state = document.getElementById('srv-state');
      var players = document.getElementById('srv-players');
      var bar = document.getElementById('srv-bar');
      if(s && s.online){
        dot.style.background = '#a6e05a';
        state.textContent = 'Online';
        if(s.players){
          players.textContent = s.players.online + ' / ' + s.players.max + ' players';
          bar.style.width = Math.round(100 * s.players.online / Math.max(1, s.players.max)) + '%';
        }
      } else {
        dot.style.background = '#c9743a';
        state.textContent = 'Offline';
      }
    })
    .catch(function(){
      document.getElementById('srv-state').textContent = 'Status unavailable';
    });
})();
</script>
{{ end }}
