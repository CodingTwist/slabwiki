{{- $u := .Destination -}}
{{- if and (strings.HasPrefix $u "/") (not (strings.HasPrefix $u "//")) -}}
  {{- $u = $u | strings.TrimPrefix "/" | relURL -}}
{{- end -}}
{{- with .Title -}}
<figure class="prose-figure"><img src="{{ $u | safeURL }}" alt="{{ $.PlainText }}"><figcaption>{{ . }}</figcaption></figure>
{{- else -}}
<img src="{{ $u | safeURL }}" alt="{{ .PlainText }}">
{{- end -}}
