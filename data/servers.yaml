# Drives the header "Worlds" nav and the server-aware sidebar. Adding a server
# is data-only: give it a slug (its content/<slug>/ section), an icon (sprite
# slug from assets/css/mc-items.css), the label for its primary nav group, and
# any quicklinks (sub-sections surfaced separately from the main list).
servers:
  - title: Survival
    slug: survival
    icon: grass-block
    navLabel: Seasons
    quicklinks:
      - {title: Map, slug: season-4/map, icon: filled-map}
      - {title: Shops, slug: season-4/shops, icon: emerald}
      - {title: Tunnels, slug: season-4/tunnels, icon: rail}
  - title: Nexus
    slug: nexus
    icon: ender-pearl
    navLabel: Games
    quicklinks: []
